name: CI

on:
  push:
    branches: [development, master]
  pull_request:
    branches: [development, master]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  ci:
    uses: AtyaLibraries/github-workflows/.github/workflows/dotnet-package-ci.yml@v1
    with:
      solution: ./Exceptions.sln
      test-project: ./tests/Exceptions.UnitTests/Exceptions.UnitTests.csproj
      package-project: ./src/Exceptions/Exceptions.csproj
      allow-empty-coverage: true # scaffold has no covered code yet; set false once you add some
